name: 🔒 DevSecOps CI/CD Pipeline (K3s + GitOps)

on:
  push:
    branches: ["2026"]
  pull_request:
    branches: ["2026"]
  workflow_dispatch:

env:
  APP_NAME: my-app
  REGISTRY: localhost:5000

permissions:
  contents: write
  security-events: write

jobs:

  # ═══════════════════════════════════════════
  # STAGE 1: SECRET SCANNING
  # ═══════════════════════════════════════════
  secret-scan:
    name: 🔐 Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════
  # STAGE 2: BUILD + TRIVY SCAN + TRANSFER
  # ═══════════════════════════════════════════
  build-scan-transfer:
    name: 🐳 Build, Scan & Transfer to EC2
    runs-on: ubuntu-latest
    needs: [secret-scan]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: echo "version=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ env.APP_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.APP_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔍 Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.APP_NAME }}:${{ steps.meta.outputs.version }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      # Save BOTH tags in tar
      - name: Save Docker image
        run: |
          docker save \
            ${{ env.APP_NAME }}:${{ steps.meta.outputs.version }} \
            ${{ env.APP_NAME }}:latest \
            | gzip > image.tar.gz
          ls -lh image.tar.gz

      # ✅ SAME SSH METHOD (was working before)
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "✅ SSH setup done"
          ls -la ~/.ssh/
          head -1 ~/.ssh/ec2_key.pem
          wc -l ~/.ssh/ec2_key.pem

      - name: 📦 Transfer image to EC2
        run: |
          scp -i ~/.ssh/ec2_key.pem \
            image.tar.gz \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/image.tar.gz

      - name: 📦 Transfer K8s manifests to EC2
        run: |
          scp -i ~/.ssh/ec2_key.pem -r \
            k8s/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/k8s/

  # ═══════════════════════════════════════════
  # STAGE 3: PUSH TO REGISTRY + DEPLOY K3s
  # ═══════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to K3s
    runs-on: ubuntu-latest
    needs: [build-scan-transfer]
    if: |
      (github.ref == 'refs/heads/2026' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'

    steps:
      # ✅ SAME SSH METHOD
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to K3s
        env:
          IMAGE_TAG: ${{ needs.build-scan-transfer.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'DEPLOY_SCRIPT'
            cd ~/app
            export KUBECONFIG=~/.kube/config
            IMAGE_TAG="${{ needs.build-scan-transfer.outputs.image_tag }}"

            echo "═══════════════════════════════════════"
            echo "📦 Step 1: Load Docker image"
            echo "═══════════════════════════════════════"
            docker load < image.tar.gz

            echo "═══════════════════════════════════════"
            echo "🏷️  Step 2: Tag & Push to local registry"
            echo "═══════════════════════════════════════"
            docker tag my-app:${IMAGE_TAG} localhost:5000/my-app:${IMAGE_TAG}
            docker tag my-app:${IMAGE_TAG} localhost:5000/my-app:latest
            docker push localhost:5000/my-app:${IMAGE_TAG}
            docker push localhost:5000/my-app:latest

            echo "✅ Registry tags:"
            curl -s http://localhost:5000/v2/my-app/tags/list

            echo ""
            echo "═══════════════════════════════════════"
            echo "📝 Step 3: Update K8s manifest with new tag"
            echo "═══════════════════════════════════════"
            sed -i "s|image:.*my-app.*|image: localhost:5000/my-app:${IMAGE_TAG}|g" k8s/deployment.yaml
            echo "Updated image:"
            grep "image:" k8s/deployment.yaml

            echo ""
            echo "═══════════════════════════════════════"
            echo "☸️  Step 4: Apply K8s manifests"
            echo "═══════════════════════════════════════"
            kubectl apply -f k8s/deployment.yaml
            kubectl apply -f k8s/service.yaml

            echo ""
            echo "═══════════════════════════════════════"
            echo "🔄 Step 5: Rolling Update"
            echo "═══════════════════════════════════════"
            kubectl rollout restart deployment/my-app
            kubectl rollout status deployment/my-app --timeout=120s

            echo ""
            echo "═══════════════════════════════════════"
            echo "✅ Step 6: Health Check"
            echo "═══════════════════════════════════════"
            DEPLOY_OK=false
            for i in 1 2 3 4 5 6; do
              sleep 5
              READY=$(kubectl get pods -l app=my-app -o jsonpath='{.items[*].status.containerStatuses[0].ready}' 2>/dev/null)
              if echo "$READY" | grep -q "true"; then
                if curl -sf http://localhost:30080 > /dev/null 2>&1; then
                  DEPLOY_OK=true
                  echo "✅ Deploy SUCCESS! (attempt $i)"
                  break
                fi
              fi
              echo "⏳ Retry $i..."
            done

            if [ "$DEPLOY_OK" = false ]; then
              echo "❌ Deploy FAILED! Rolling back..."
              kubectl rollout undo deployment/my-app
              kubectl rollout status deployment/my-app --timeout=60s
              echo ""
              echo "🔍 Pod logs:"
              kubectl logs -l app=my-app --tail=20 2>/dev/null || true
              echo "🔍 Pod events:"
              kubectl describe pods -l app=my-app | tail -20
              exit 1
            fi

            echo ""
            echo "═══════════════════════════════════════"
            echo "📊 Step 7: Status Report"
            echo "═══════════════════════════════════════"
            echo ""
            echo "🏷️  Image: localhost:5000/my-app:${IMAGE_TAG}"
            echo ""
            echo "📋 Pods:"
            kubectl get pods -l app=my-app -o wide
            echo ""
            echo "🌐 Service:"
            kubectl get svc my-app-svc
            echo ""
            echo "🐳 Registry:"
            curl -s http://localhost:5000/v2/my-app/tags/list
            echo ""

            echo ""
            echo "═══════════════════════════════════════"
            echo "🧹 Step 8: Cleanup"
            echo "═══════════════════════════════════════"
            rm -f image.tar.gz

            # Clean old Docker images (keep current + latest)
            docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' | \
              grep 'my-app' | \
              grep -v ":${IMAGE_TAG}" | \
              grep -v ":latest" | \
              awk '{print $1}' | \
              xargs -r docker rmi 2>/dev/null || true

            docker image prune -f 2>/dev/null || true

            # Registry garbage collect
            docker exec docker-registry bin/registry garbage-collect \
              /etc/docker/registry/config.yml --delete-untagged 2>/dev/null || true

            echo ""
            echo "📊 Disk:"
            df -h / | tail -1
            echo ""
            echo "🐳 Docker disk:"
            docker system df 2>/dev/null || true
            echo ""
            echo "✅ Cleanup done"
          DEPLOY_SCRIPT

          echo "🏁 Pipeline completed"