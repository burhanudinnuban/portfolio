name: 🔒 DevSecOps CI/CD Pipeline (Local Registry)

on:
  push:
    branches: ["2026"]
  pull_request:
    branches: ["2026"]
  workflow_dispatch:         # ← allows manual trigger
env:
  APP_NAME: my-app
  REGISTRY: localhost:5000

permissions:
  contents: read
  security-events: write

jobs:

  # ═══════════════════════════════════════════
  # STAGE 1: SECRET SCANNING
  # ═══════════════════════════════════════════
  secret-scan:
    name: 🔐 Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════
  # STAGE 2: CODE QUALITY + SAST
  # ═══════════════════════════════════════════
  # code-quality:
  #   name: 🔍 Code Quality (SonarCloud)
  #   runs-on: ubuntu-latest
  #   needs: [secret-scan]
  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 0

  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: '20'
  #         cache: 'npm'

  #     - name: Install dependencies
  #       run: npm ci

  #     - name: Run Lint
  #       run: npm run lint --if-present

  #     - name: SonarCloud Scan
  #       uses: sonarsource/sonarcloud-github-action@v3
  #       env:
  #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════
  # STAGE 3: BUILD + TRIVY SCAN + TRANSFER
  # ═══════════════════════════════════════════
  build-scan-transfer:
    name: 🐳 Build, Scan & Transfer to EC2
    runs-on: ubuntu-latest
    # needs: [secret-scan, code-quality]
    needs: [secret-scan]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      # Generate image tag (short SHA)
      - name: Generate image tag
        id: meta
        run: echo "version=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      # Setup buildx for cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Docker image
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ env.APP_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.APP_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Security: Trivy vulnerability scan
      - name: 🛡️ Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.APP_NAME }}:${{ steps.meta.outputs.version }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      # Save Docker image as tar.gz (compressed)
      - name: Save Docker image
        run: |
          docker save ${{ env.APP_NAME }}:${{ steps.meta.outputs.version }} | gzip > image.tar.gz
          ls -lh image.tar.gz

      # Setup SSH
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Transfer image to EC2
      - name: 📦 Transfer image to EC2
        run: |
          scp -i ~/.ssh/ec2_key.pem \
            image.tar.gz \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/image.tar.gz

      # Copy docker-compose to EC2
      - name: Copy docker-compose to EC2
        run: |
          scp -i ~/.ssh/ec2_key.pem \
            docker-compose.prod.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/docker-compose.yml

  # ═══════════════════════════════════════════
  # STAGE 4: DEPLOY (Load → Push to Registry → Run)
  # ═══════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-scan-transfer]
    if: github.ref == 'refs/heads/2026' && github.event_name == 'push'

    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          IMAGE_TAG: ${{ needs.build-scan-transfer.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'DEPLOY_SCRIPT'
            set -e
            cd ~/app

            echo "═══════════════════════════════════════"
            echo "📦 Step 1: Load Docker image"
            echo "═══════════════════════════════════════"
            docker load < image.tar.gz

            IMAGE_TAG="${{ needs.build-scan-transfer.outputs.image_tag }}"

            echo "═══════════════════════════════════════"
            echo "🏷️ Step 2: Tag for local registry"
            echo "═══════════════════════════════════════"
            docker tag my-app:${IMAGE_TAG} localhost:5000/my-app:${IMAGE_TAG}
            docker tag my-app:${IMAGE_TAG} localhost:5000/my-app:latest

            echo "═══════════════════════════════════════"
            echo "📤 Step 3: Push to local registry"
            echo "═══════════════════════════════════════"
            docker push localhost:5000/my-app:${IMAGE_TAG}
            docker push localhost:5000/my-app:latest

            echo "═══════════════════════════════════════"
            echo "🚀 Step 4: Deploy with Docker Compose"
            echo "═══════════════════════════════════════"
            docker compose down --remove-orphans || true
            docker compose pull
            docker compose up -d

            echo "═══════════════════════════════════════"
            echo "🧹 Step 5: Cleanup"
            echo "═══════════════════════════════════════"
            rm -f image.tar.gz
            # Remove dangling images (save disk on t2.micro)
            docker image prune -f

            echo "═══════════════════════════════════════"
            echo "✅ Step 6: Health Check"
            echo "═══════════════════════════════════════"
            for i in 1 2 3 4 5; do
              sleep 3
              if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
                echo "✅ Deploy SUCCESS! (attempt $i)"
                echo ""
                echo "📊 Running containers:"
                docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
                echo ""
                echo "📦 Registry images:"
                curl -s http://localhost:5000/v2/_catalog | python3 -m json.tool
                echo ""
                echo "🏷️ Image tags:"
                curl -s http://localhost:5000/v2/my-app/tags/list | python3 -m json.tool
                exit 0
              fi
              echo "⏳ Retry $i..."
            done
            echo "❌ Deploy FAILED!"
            docker logs my-app --tail 20
            exit 1
          DEPLOY_SCRIPT