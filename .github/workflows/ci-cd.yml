name: 🔒 DevSecOps CI/CD Pipeline (Local Registry)

on:
  push:
    branches: ["2026"]
  pull_request:
    branches: ["2026"]
  workflow_dispatch:

env:
  APP_NAME: my-app
  REGISTRY: localhost:5000

permissions:
  contents: read
  security-events: write

jobs:

  # ═══════════════════════════════════════════
  # STAGE 1: SECRET SCANNING
  # ═══════════════════════════════════════════
  secret-scan:
    name: 🔐 Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════
  # STAGE 3: BUILD + TRIVY SCAN + TRANSFER
  # ═══════════════════════════════════════════
  build-scan-transfer:
    name: 🐳 Build, Scan & Transfer to EC2
    runs-on: ubuntu-latest
    needs: [secret-scan]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: echo "version=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ env.APP_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.APP_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Save BOTH tags in tar
      - name: Save Docker image
        run: |
          docker save \
            ${{ env.APP_NAME }}:${{ steps.meta.outputs.version }} \
            ${{ env.APP_NAME }}:latest \
            | gzip > image.tar.gz
          ls -lh image.tar.gz

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 📦 Transfer image to EC2
        run: |
          scp -i ~/.ssh/ec2_key.pem \
            image.tar.gz \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/image.tar.gz

      - name: Copy docker-compose to EC2
        run: |
          scp -i ~/.ssh/ec2_key.pem \
            docker-compose.prod.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/docker-compose.yml

  # ═══════════════════════════════════════════
  # STAGE 4: DEPLOY
  # ═══════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-scan-transfer]
    # ✅ FIX 1: Allow deploy on push AND workflow_dispatch
    if: |
      (github.ref == 'refs/heads/2026' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          IMAGE_TAG: ${{ needs.build-scan-transfer.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'DEPLOY_SCRIPT'
            set -e
            cd ~/app

            echo "═══════════════════════════════════════"
            echo "📦 Step 1: Load Docker image"
            echo "═══════════════════════════════════════"
            docker load < image.tar.gz

            IMAGE_TAG="${{ needs.build-scan-transfer.outputs.image_tag }}"

            echo "═══════════════════════════════════════"
            echo "🏷️ Step 2: Tag for local registry"
            echo "═══════════════════════════════════════"
            docker tag my-app:${IMAGE_TAG} localhost:5000/my-app:${IMAGE_TAG}
            docker tag my-app:${IMAGE_TAG} localhost:5000/my-app:latest

            echo "═══════════════════════════════════════"
            echo "📤 Step 3: Push to local registry"
            echo "═══════════════════════════════════════"
            docker push localhost:5000/my-app:${IMAGE_TAG}
            docker push localhost:5000/my-app:latest

            echo "═══════════════════════════════════════"
            echo "🚀 Step 4: Stop old container"
            echo "═══════════════════════════════════════"
            docker compose down --remove-orphans || true

            # ✅ FIX 2: Remove old container + image cache completely
            docker rm -f my-app 2>/dev/null || true
            docker rmi localhost:5000/my-app:previous 2>/dev/null || true

            echo "═══════════════════════════════════════"
            echo "🚀 Step 5: Pull fresh + Force recreate"
            echo "═══════════════════════════════════════"
            # ✅ FIX 3: Force pull + force recreate (IMPORTANT!)
            docker compose pull --ignore-pull-failures
            docker compose up -d --force-recreate --remove-orphans

            echo "═══════════════════════════════════════"
            echo "🧹 Step 6: Cleanup"
            echo "═══════════════════════════════════════"
            rm -f image.tar.gz
            docker image prune -f

            echo "═══════════════════════════════════════"
            echo "✅ Step 7: Health Check"
            echo "═══════════════════════════════════════"
            for i in 1 2 3 4 5; do
              sleep 3
              if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
                echo "✅ Deploy SUCCESS! (attempt $i)"
                echo ""
                echo "📊 Running containers:"
                docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
                echo ""
                echo "📦 Registry catalog:"
                curl -s http://localhost:5000/v2/_catalog | python3 -m json.tool
                echo ""
                echo "🏷️ Image tags:"
                curl -s http://localhost:5000/v2/my-app/tags/list | python3 -m json.tool
                echo ""
                echo "🔍 Current image ID:"
                docker inspect my-app --format='{{.Image}}' | cut -c8-19
                exit 0
              fi
              echo "⏳ Retry $i..."
            done
            echo "❌ Deploy FAILED!"
            docker logs my-app --tail 20
            exit 1
          DEPLOY_SCRIPT